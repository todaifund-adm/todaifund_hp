<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News — 東大創業者の会ファンド</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ─── Newsページ固有スタイル ─── */

    .news-page {
      background: var(--white);
      padding: 80px 64px 120px;
    }

    .news-page-inner {
      max-width: 800px;
      margin: 0 auto;
    }

    /* ─── カテゴリフィルター ─── */
    .news-filter {
      display: flex;
      gap: 8px;
      margin-bottom: 56px;
      flex-wrap: wrap;
    }

    .news-filter-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 12px;
      letter-spacing: 0.2em;
      padding: 8px 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-light);
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .news-filter-btn:hover,
    .news-filter-btn.active {
      background: var(--navy);
      color: var(--white);
      border-color: var(--navy);
    }

    /* ─── ニュースリスト ─── */
    .news-page-list {
      list-style: none;
    }

    .news-page-item {
      display: grid;
      grid-template-columns: 120px 80px 1fr;
      gap: 0 24px;
      align-items: baseline;
      padding: 28px 0;
      border-top: 1px solid var(--border);
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .news-page-item:last-child {
      border-bottom: 1px solid var(--border);
    }

    .news-page-item:hover {
      opacity: 0.65;
      cursor: pointer;
    }

    .news-page-date {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      color: var(--accent);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .news-page-category {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--text-light);
      padding: 3px 8px;
      border: 1px solid var(--border);
      white-space: nowrap;
      align-self: center;
    }

    .news-page-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 15px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.7;
      letter-spacing: 0.03em;
      text-decoration: none;
    }

    .news-page-title:hover {
      color: var(--accent);
    }

    @media (max-width: 900px) {
      .news-page { padding: 60px 32px 80px; }
      .news-page-item {
        grid-template-columns: 1fr;
        gap: 8px;
      }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <ul class="nav-links">
    <li><a href="index.html">TOP</a></li>
    <li><a href="index.html#news" style="color:var(--accent-light);">NEWS</a></li>
    <li><a href="index.html#about">ABOUT</a></li>
    <li><a href="index.html#activities">ACTIVITIES</a></li>
    <li><a href="index.html#members">MEMBERS</a></li>
    <li><a href="portfolio.html">PORTFOLIO</a></li>
    <li><a href="events.html">EVENTS</a></li>
  </ul>
  <a href="index.html#contact" class="nav-contact">CONTACT</a>
</nav>

<!-- PAGE HERO -->
<section class="page-hero">
  <div class="page-hero-grid"></div>
  <div class="page-hero-content">
    <p class="page-hero-label">NEWS</p>
    <h1 class="page-hero-title">お知らせ</h1>
  </div>
</section>

<!-- NEWS LIST -->
<section class="news-page">
  <div class="news-page-inner">

    <!-- カテゴリフィルター -->
    <div class="news-filter fade-up">
      <button class="news-filter-btn active" onclick="filterNews('all', this)">ALL</button>
      <button class="news-filter-btn" onclick="filterNews('event', this)">EVENT</button>
      <button class="news-filter-btn" onclick="filterNews('info', this)">INFO</button>
      <button class="news-filter-btn" onclick="filterNews('investment', this)">INVESTMENT</button>
    </div>

    <ul class="news-page-list" id="news-list"></ul>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="footer-logo">
    東大創業者の会ファンド
    <span>U-TOKYO ENTREPRENEUR SUPPORTER'S CLUB INCUBATION FUND</span>
  </div>
  <div class="footer-sns">
    <a href="#">Facebook</a>
  </div>
</footer>

<script src="js/news-data.js"></script>
<script>
  // スクロールアニメーション
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(el => {
      if (el.isIntersecting) el.target.classList.add('visible');
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

  // ニュースを描画する関数
  function renderNews(filter = 'all') {
    const list = document.getElementById('news-list');
    const filtered = filter === 'all'
      ? newsData
      : newsData.filter(item => item.category === filter);

    list.innerHTML = filtered.map(item => `
      <li class="news-page-item" data-category="${item.category}">
        <span class="news-page-date">${item.date}</span>
        <span class="news-page-category">${item.category.toUpperCase()}</span>
        <a href="${item.url}" class="news-page-title">${item.title}</a>
      </li>
    `).join('');
  }

  // カテゴリフィルター
  function filterNews(category, btn) {
    document.querySelectorAll('.news-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderNews(category);
  }

  // 初期表示
  renderNews();
</script>
</body>
</html>
