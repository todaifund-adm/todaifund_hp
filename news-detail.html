<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News — 東大創業者の会ファンド</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ─── 記事ページ固有スタイル ─── */

    .article-page {
      background: var(--white);
      padding: 80px 64px 120px;
    }

    .article-inner {
      max-width: 760px;
      margin: 0 auto;
    }

    /* ─── メタ情報（日付・カテゴリ） ─── */
    .article-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .article-date {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .article-category {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--text-light);
      padding: 3px 10px;
      border: 1px solid var(--border);
    }

    /* ─── タイトル ─── */
    .article-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 24px;
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.7;
      letter-spacing: 0.03em;
      margin-bottom: 48px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    /* ─── 本文 ─── */
    .article-body {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      font-weight: 300;
      color: var(--text-dark);
      line-height: 2;
      letter-spacing: 0.03em;
    }

    .article-body p {
      margin-bottom: 1.6em;
    }

    .article-body h2 {
      font-family: 'Noto Serif JP', serif;
      font-size: 17px;
      font-weight: 500;
      margin: 2em 0 0.8em;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .article-body a {
      color: var(--accent);
      word-break: break-all;
    }

    .article-body a:hover {
      opacity: 0.7;
    }

    .article-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2em 0;
    }

    /* ─── テーブル（ファンド概要など） ─── */
    .article-body table {
      width: 100%;
      max-width: 660px;
      border-collapse: collapse;
      margin: 1.6em 0;
      font-size: 14px;
    }

    .article-body table td {
      padding: 10px 14px;
      border: 1px solid var(--border);
      vertical-align: top;
      line-height: 1.8;
    }

    .article-body table td:first-child {
      white-space: nowrap;
      color: var(--text-light);
      font-weight: 400;
      width: 130px;
    }

    /* ─── 戻るリンク ─── */
    .article-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 64px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 0.2em;
      color: var(--text-light);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
      transition: color 0.2s, border-color 0.2s;
    }

    .article-back:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ─── 404 ─── */
    .article-not-found {
      text-align: center;
      padding: 80px 0;
      color: var(--text-light);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
    }

    @media (max-width: 900px) {
      .article-page { padding: 60px 24px 80px; }
      .article-title { font-size: 20px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <ul class="nav-links">
    <li><a href="index.html">TOP</a></li>
    <li><a href="news.html" style="color:var(--accent-light);">NEWS</a></li>
    <li><a href="index.html#about">ABOUT</a></li>
    <li><a href="index.html#activities">ACTIVITIES</a></li>
    <li><a href="index.html#members">MEMBERS</a></li>
    <li><a href="portfolio.html">PORTFOLIO</a></li>
    <li><a href="events.html">EVENTS</a></li>
  </ul>
  <a href="index.html#contact" class="nav-contact">CONTACT</a>
</nav>

<!-- PAGE HERO -->
<section class="page-hero">
  <div class="page-hero-grid"></div>
  <div class="page-hero-content">
    <p class="page-hero-label">NEWS</p>
    <h1 class="page-hero-title">お知らせ</h1>
  </div>
</section>

<!-- ARTICLE -->
<section class="article-page">
  <div class="article-inner" id="article-content">
    <!-- JSで描画 -->
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="footer-logo">
    東大創業者の会ファンド
    <span>U-TOKYO ENTREPRENEUR SUPPORTER'S CLUB INCUBATION FUND</span>
  </div>
  <div class="footer-sns">
    <a href="#">Facebook</a>
  </div>
</footer>

<script src="js/news-data.js"></script>
<script>
  // URLからslugを取得
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');

  const container = document.getElementById('article-content');

  if (!slug) {
    // slugなし → ニュース一覧へリダイレクト
    window.location.href = 'news.html';
  } else {
    const article = newsData.find(item => item.slug === slug);

    if (!article) {
      container.innerHTML = `
        <div class="article-not-found">
          <p>記事が見つかりませんでした。</p>
          <a href="news.html" class="article-back">← BACK TO NEWS</a>
        </div>
      `;
    } else {
      // タイトルをページタイトルにも反映
      document.title = article.title + ' — 東大創業者の会ファンド';

      const categoryLabel = {
        event: 'EVENT',
        investment: 'INVESTMENT',
        info: 'INFO'
      }[article.category] || article.category.toUpperCase();

      container.innerHTML = `
        <div class="article-meta fade-up">
          <span class="article-date">${article.date}</span>
          <span class="article-category">${categoryLabel}</span>
        </div>
        <h1 class="article-title fade-up">${article.title}</h1>
        <div class="article-body fade-up">
          ${article.body || '<p>本文はまだ準備中です。</p>'}
        </div>
        <a href="news.html" class="article-back fade-up">← BACK TO NEWS</a>
      `;

      // スクロールアニメーション
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(el => {
          if (el.isIntersecting) el.target.classList.add('visible');
        });
      }, { threshold: 0.1 });
      document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
    }
  }
</script>
</body>
</html>
